name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: cafemitierra
          POSTGRES_PASSWORD: cafemitierra_dev
          POSTGRES_DB: cafemitierra
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check backend
        run: pnpm --filter backend typecheck

      - name: Run backend tests
        run: pnpm --filter backend test
        env:
          DATABASE_URL: postgres://cafemitierra:cafemitierra_dev@localhost:5432/cafemitierra
          CORS_ORIGINS: '["http://localhost:4321"]'
          NODE_ENV: development
          AUTH_CORE_URL: http://localhost:3000
          AUTH_CORE_PUBLIC_KEY: dummy-key-for-ci
          DEV_TOKEN: dev-token
          CLOUDINARY_CLOUD_NAME: dummy
          CLOUDINARY_API_KEY: dummy
          CLOUDINARY_API_SECRET: dummy

  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run frontend tests
        run: pnpm --filter frontend test

  coverage:
    name: Coverage Report
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: cafemitierra
          POSTGRES_PASSWORD: cafemitierra_dev
          POSTGRES_DB: cafemitierra
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests with coverage
        run: pnpm --filter backend test:coverage
        env:
          DATABASE_URL: postgres://cafemitierra:cafemitierra_dev@localhost:5432/cafemitierra
          CORS_ORIGINS: '["http://localhost:4321"]'
          NODE_ENV: development
          AUTH_CORE_URL: http://localhost:3000
          AUTH_CORE_PUBLIC_KEY: dummy-key-for-ci
          DEV_TOKEN: dev-token
          CLOUDINARY_CLOUD_NAME: dummy
          CLOUDINARY_API_KEY: dummy
          CLOUDINARY_API_SECRET: dummy

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/coverage/

  lint:
    name: Lint Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Biome check
        run: pnpm lint:check

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: cafemitierra
          POSTGRES_PASSWORD: cafemitierra_dev
          POSTGRES_DB: cafemitierra
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install chromium

      - name: Start backend
        run: |
          cd backend && pnpm start &
          sleep 3
        env:
          DATABASE_URL: postgres://cafemitierra:cafemitierra_dev@localhost:5432/cafemitierra
          CORS_ORIGINS: '["http://localhost:4321"]'
          NODE_ENV: development
          DEV_TOKEN: dev-token
          PORT: 8001

      - name: Start frontend
        run: |
          cd frontend && npx astro dev --host &
          sleep 5
        env:
          API_TARGET: http://localhost:8001
          PUBLIC_API_URL: http://localhost:8001

      - name: Run E2E tests
        run: pnpm test:e2e
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:4323

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: e2e-screenshots
          path: test-results/

  typecheck-frontend:
    name: Frontend Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check frontend
        run: pnpm --filter frontend astro check
